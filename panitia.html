<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<script>(function(){try{var t=localStorage.getItem('rt08-theme');document.documentElement.setAttribute('data-theme',(t==='dark')?'dark':'light');}catch(e){}})();</script>
<title>Panel Panitia · RT 08</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
:root{
  --merah:#5C5CFF;--merah2:#3D3DFF;--info:#4A69FF;
  --bg0:#0A0A14;--bg1:#101022;--bg2:#16162A;--solid2:#1C1C38;
  --bd:rgba(255,255,255,.10);--bd2:rgba(255,255,255,.16);
  --ink:#E2E2F0;--ink2:#C4C4D6;--muted:#7A7A99;
  --chip:rgba(92,92,255,.18);--merah-glow:rgba(92,92,255,.30);
  --ok:#3BA559;--warn:#E6A100;--danger:#F784C5;
  --sh:0 10px 30px -18px rgba(0,0,0,.7);
  --maxw:760px;--font:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
[data-theme="light"]{
  --merah:#000072;--merah2:#1F1F9C;--info:#4A69FF;
  --bg0:#F8F9FA;--bg1:#EEF0F4;--bg2:#FFFFFF;--solid2:#F2F3F7;
  --bd:rgba(17,17,34,.09);--bd2:rgba(17,17,34,.16);
  --ink:#111122;--ink2:#3A3A52;--muted:#6E6E8A;
  --chip:#E7E9FF;--merah-glow:rgba(0,0,114,.20);
  --ok:#1B602F;--warn:#B26A00;--danger:#C2185B;
  --sh:0 10px 28px -20px rgba(0,0,40,.28);
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg0);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;min-height:100vh}
.iconify{vertical-align:-.15em}
.top{position:sticky;top:0;z-index:30;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;min-height:54px;padding:env(safe-area-inset-top,0px) 12px 0;background:var(--bg2);border-bottom:1px solid var(--bd)}
.top .back{display:inline-flex;align-items:center;gap:6px;justify-self:start;color:var(--ink2);text-decoration:none;font-weight:700;font-size:14px;background:transparent;border:0;cursor:pointer}
.top #themeBtn{justify-self:end}
.top-t{font-weight:800;font-size:15px}
.wrap{max-width:var(--maxw);margin:0 auto;padding:12px 14px calc(80px + env(safe-area-inset-bottom,0px))}
.hero{position:relative;overflow:hidden;border-radius:24px;background:linear-gradient(140deg,var(--merah2) 0%,var(--merah) 50%,var(--merah2) 100%);background-size:200% 200%;box-shadow:0 16px 40px -22px var(--merah-glow);animation:heroGrad 8s ease-in-out infinite;margin:14px 14px 0}
@media(min-width:720px){.hero{margin:0;border-radius:28px}}
@keyframes heroGrad{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.hero::before{content:"";position:absolute;top:0;right:10px;bottom:0;width:52%;background:url('https://cdn.jsdelivr.net/gh/djaiss/mapsicon@master/all/id/vector.svg') no-repeat right center;background-size:auto 120%;filter:brightness(0) invert(1);opacity:.08;pointer-events:none}
.hero-in{position:relative;z-index:1;padding:22px 18px 24px}
@media(min-width:720px){.hero-in{padding:32px 36px}}
.hero h1{margin:0;font-size:21px;line-height:1.2;font-weight:800;color:#fff;letter-spacing:-.01em}
.hero .sub{margin:8px 0 0;font-size:12.5px;line-height:1.5;color:rgba(255,255,255,.92);font-weight:500;max-width:46ch}
@media(min-width:720px){.hero h1{font-size:28px}.hero .sub{font-size:13px}}
@media(min-width:720px){.hero-in{padding:32px 36px}.hero h1{font-size:28px}}
.card{margin-top:12px;background:var(--bg2);border:1px solid var(--bd);border-radius:20px;box-shadow:var(--sh);padding:16px}
@media(max-width:400px){.card{padding:14px;border-radius:16px;margin-top:10px}}
@media(hover:hover){.card:hover{box-shadow:0 14px 36px -16px rgba(0,0,0,.3)!important}}
.inp{width:100%;padding:13px;border:1px solid var(--bd2);border-radius:14px;background:var(--bg1);color:var(--ink);font:inherit;font-size:16px;outline:none}
@media(min-width:560px){.inp{font-size:14px}}
.inp:focus{border-color:var(--merah)}
textarea.inp{resize:vertical;min-height:66px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border:0;border-radius:14px;font:inherit;font-weight:700;font-size:15px;cursor:pointer;background:var(--bg1);color:var(--ink)}
.btn-go{background:var(--merah);color:#fff}.btn-go:disabled{opacity:.55;cursor:not-allowed}
.icon-btn{display:grid;place-items:center;width:38px;height:38px;border:1px solid var(--bd);background:var(--bg1);color:var(--ink2);border-radius:12px;cursor:pointer;font-size:18px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.field>span{font-size:12px;font-weight:700;color:var(--muted)}
.gate{text-align:center;max-width:360px;margin-left:auto;margin-right:auto}
.gate-ic{font-size:40px;color:var(--merah)}
.gate-t{font-weight:800;font-size:17px;margin:6px 0 2px}
.gate-s{font-size:12.5px;color:var(--muted);margin-bottom:14px}
.gate .inp{margin-bottom:10px}
@media(max-width:400px){.gate{max-width:100%}.gate .inp{padding:14px;font-size:16px}}
.gate-msg{font-size:12.5px;color:var(--danger);margin-top:10px;min-height:16px;font-weight:600}
/* BOTTOM NAV (tetap, notch-safe, 5 kolom sama besar) */
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:60;display:grid;grid-template-columns:repeat(5,1fr);background:var(--bg2);border-top:1px solid var(--bd);box-shadow:0 -12px 34px -20px rgba(0,0,0,.8);padding-bottom:env(safe-area-inset-bottom,0px)}
.tab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px 2px 7px;border:0;background:transparent;color:var(--muted);font:inherit;font-weight:700;font-size:10px;cursor:pointer;transition:.16s ease}
@media(max-width:400px){.tab{font-size:9.5px;padding:7px 1px 6px}.tab .iconify{font-size:19px}}
.tab .iconify{font-size:21px;transition:.16s ease}
.tab i{font-style:normal}
.tab.on{color:var(--merah)}
.tab.on .iconify{transform:translateY(-1px) scale(1.08)}
@media(min-width:560px){.tab{font-size:11.5px;gap:5px}.tab .iconify{font-size:22px}}
/* iuran summary */
.tool-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.tool-h b{font-size:16px}.tool-sub{display:block;font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px}
.summary{display:flex;align-items:center;gap:14px}
.ring{--p:0;width:74px;height:74px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;background:conic-gradient(var(--merah) calc(var(--p)*1%),var(--bd2) 0)}
@media(max-width:400px){.summary{gap:10px}.ring{width:64px;height:64px}.ring span{width:48px;height:48px;font-size:12px}.stats{gap:6px}.st{padding:6px 8px;font-size:10px}.st b{font-size:14px}}
.ring span{width:56px;height:56px;border-radius:50%;background:var(--bg2);display:grid;place-items:center;font-weight:800;font-size:14px}
.stats{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.st{background:var(--bg1);border:1px solid var(--bd);border-radius:12px;padding:7px 10px;font-size:11px;color:var(--muted);font-weight:600;display:flex;flex-direction:column}
.st b{font-size:16px;color:var(--ink)}
.st.ok b{color:var(--ok)}.st.mid b{color:var(--warn)}.st.no b{color:var(--danger)}
.search{display:flex;align-items:center;gap:8px;background:var(--bg1);border:1px solid var(--bd2);border-radius:14px;padding:0 12px;margin-bottom:12px}
.search .iconify{color:var(--muted)}
.search input{flex:1;border:0;background:transparent;outline:none;font:inherit;font-size:14px;color:var(--ink);padding:12px 0}
.kk-list{display:flex;flex-direction:column;gap:11px}
.kk,.pn-row{display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid var(--bd);border-radius:16px;background:var(--bg1)}
.kk{padding:15px 16px}
@media(max-width:400px){.kk{padding:13px 14px}.kk-top b{font-size:13.5px}.kk-blok{font-size:11px;margin:3px 0 8px}.kk-amt{font-size:11.5px}.kk-btn{padding:9px 11px;font-size:12px}}
.pn-row{padding:10px 12px;margin-bottom:8px}
.kk-info{flex:1;min-width:0}
.kk-top{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.kk-top b{font-size:14.5px}
.kk-blok{font-size:11.5px;color:var(--muted);display:block;margin:3px 0 10px}
.chip{font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px}
.chip.ok{background:rgba(59,165,89,.16);color:var(--ok)}
.chip.mid{background:rgba(230,161,0,.18);color:var(--warn)}
.chip.no{background:rgba(247,132,197,.16);color:var(--danger)}
.bar{height:7px;border-radius:999px;background:var(--bd2);overflow:hidden}
.bar i{display:block;height:100%;border-radius:999px;background:var(--merah)}
.bar i.ok{background:var(--ok)}.bar i.mid{background:var(--warn)}.bar i.no{background:var(--danger)}
.kk-amt{font-size:12px;color:var(--ink2);font-weight:600;display:block;margin-top:8px}
.kk-btn{flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;border:0;border-radius:12px;background:var(--merah);color:#fff;font:inherit;font-weight:700;font-size:12.5px;padding:10px 13px;cursor:pointer}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:26px 10px}
/* lomba ctx */
.sel-row{display:flex;gap:10px}.sel-row .field{flex:1}
.statusbar{display:flex;flex-wrap:wrap;gap:6px}
.pill{padding:7px 11px;border-radius:999px;border:1px solid var(--bd2);background:var(--bg1);color:var(--ink2);font:inherit;font-size:12px;font-weight:700;cursor:pointer}
.pill.on{background:var(--merah);border-color:var(--merah);color:#fff}
.pill.on[data-st="Sedang main"]{background:#1f9d55;border-color:#1f9d55}
.pill.on[data-st="Bersiap"]{background:#d99411;border-color:#d99411;color:#1a1a1a}
.pill.on[data-st="Selesai"]{background:#3457d5;border-color:#3457d5}
.seg{display:flex;gap:4px;flex:0 0 auto}
.seg button{width:32px;height:32px;border:1px solid var(--bd2);background:var(--bg2);color:var(--ink);border-radius:9px;font:inherit;font-weight:800;font-size:13px;cursor:pointer;padding:0}
.seg button.on{background:var(--merah);border-color:var(--merah);color:#fff}
.seg button.on.g{background:#777;border-color:#777}
.two{display:flex;gap:6px;flex:0 0 auto}
.two button{padding:8px 12px;border:1px solid var(--bd2);background:var(--bg2);color:var(--ink);border-radius:9px;font:inherit;font-weight:700;font-size:12px;cursor:pointer}
.two button.on-h{background:#1f9d55;border-color:#1f9d55;color:#fff}
.two button.on-t{background:#b3225f;border-color:#b3225f;color:#fff}
.del{flex:0 0 auto;background:transparent;border:1px solid var(--bd2);color:var(--danger);border-radius:9px;padding:7px 11px;font:inherit;font-size:11.5px;font-weight:700;cursor:pointer}
.mini{border:1px dashed var(--bd2);border-radius:14px;padding:12px;margin-top:10px}
.mini-h{font-size:12.5px;font-weight:800;color:var(--ink2);margin-bottom:10px}
.mini .inp{margin-bottom:8px}
.note{font-size:12.5px;color:var(--muted);margin-bottom:10px;font-weight:600}
.rank-in{border:1px solid var(--bd);border-radius:12px;padding:10px;margin-bottom:8px;background:var(--bg1)}
.rank-in .inp{margin-bottom:6px}
.medal{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:800;margin-bottom:8px}
.medal .iconify{font-size:16px}
.medal.m1{color:#F5B301}.medal.m2{color:#A8B2BD}.medal.m3{color:#CD7F32}
.check{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink2);font-weight:600;margin:4px 0 12px}
.quick{display:flex;flex-wrap:wrap;gap:6px;margin:-4px 0 12px}
.quick button{border:1px solid var(--bd2);background:var(--bg1);color:var(--ink2);border-radius:999px;font:inherit;font-weight:700;font-size:12px;padding:7px 11px;cursor:pointer}
.quick button.q-full{border-color:var(--merah);color:var(--merah)}
.scrim{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.5)}
.modal{position:fixed;z-index:81;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:var(--maxw);background:var(--bg2);border:1px solid var(--bd);border-radius:20px 20px 0 0;box-shadow:var(--sh);padding:16px 14px calc(16px + env(safe-area-inset-bottom))}
@media(max-width:400px){.modal{padding:14px 12px calc(14px + env(safe-area-inset-bottom))}.modal-h b{font-size:14px}}
@media(min-width:720px){.modal{bottom:auto;top:50%;transform:translate(-50%,-50%);border-radius:22px}}
.modal-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.modal-h b{font-size:16px}
.modal-kk{background:var(--bg1);border:1px solid var(--bd);border-radius:14px;padding:11px 12px;margin-bottom:14px}
.modal-kk b{display:block;font-size:14px}.modal-kk span{font-size:11.5px;color:var(--muted)}
.toast{position:fixed;left:50%;bottom:calc(80px + env(safe-area-inset-bottom,0px));transform:translateX(-50%);z-index:90;background:#111;color:#fff;font-weight:700;font-size:13px;padding:11px 18px;border-radius:12px;opacity:0;pointer-events:none;transition:.2s;max-width:84%;text-align:center}
.toast.show{opacity:1}.toast.ok{background:var(--ok)}.toast.err{background:#b3225f}
[hidden]{display:none!important}

.pay-history{
  margin-top:12px;
  padding:12px;
  border:1px solid var(--bd2);
  border-radius:14px;
  background:var(--glass-2);
}

.pay-history>b{
  display:block;
  margin-bottom:8px;
  font-size:13px;
  font-weight:800;
}

.pay-row{
  display:grid;
  grid-template-columns:1fr auto;
  gap:4px 8px;
  padding:8px 0;
  border-top:1px solid var(--bd2);
  font-size:12.5px;
}

.pay-row:first-of-type{
  border-top:none;
}

.pay-row small{
  grid-column:1/-1;
  color:var(--muted);
  line-height:1.35;
}

.pay-history.empty{
  color:var(--muted);
  font-size:12.5px;
}
</style>
</head>
<body>
<header class="top">
  <a class="back" href="index.html"><span class="iconify" data-icon="solar:alt-arrow-left-linear"></span> Beranda</a>
  <div class="top-t">Panel Panitia</div>
  <button class="back icon-btn" id="themeBtn" aria-label="Tema"><span class="iconify" data-icon="solar:moon-bold"></span></button>
</header>

<main class="wrap">
  <section class="hero"><div class="hero-in">
    <h1>Panel Panitia</h1>
    <p class="sub">Kelola iuran, hasil lomba, kehadiran, peserta & pengumuman RT 08 — HUT RI ke-81. Semua tersinkron otomatis ke spreadsheet.</p>
  </div></section>

  <section class="card gate" id="gate" hidden>
    <span class="iconify gate-ic" data-icon="solar:lock-keyhole-bold"></span>
    <div class="gate-t">Masuk Panel Panitia</div>
    <div class="gate-s">Khusus panitia. Masukkan kode akses.</div>
    <input class="inp" id="gToken" type="password" placeholder="Kode akses" autocomplete="off">
    <button class="btn btn-go" id="gEnter">Masuk</button>
    <div class="gate-msg" id="gMsg"></div>
  </section>

  <section id="app" hidden>
    <!-- IURAN -->
    <div class="pane" id="paneIuran">
      <div class="card">
        <div class="tool-h"><div><b>Iuran Warga</b><span class="tool-sub" id="targetLbl"></span></div>
          <button class="icon-btn" id="refreshBtn"><span class="iconify" data-icon="solar:refresh-bold"></span></button></div>
        <div id="summary" class="summary"></div>
      </div>
      <div class="card">
        <label class="field"><span>Nama pencatat (panitia)</span><input class="inp" id="oleh" placeholder="mis. Budi (Bendahara)"></label>
        <div class="search"><span class="iconify" data-icon="solar:magnifer-linear"></span><input id="search" placeholder="Cari nama / blok…"></div>
        <div id="kkList" class="kk-list"></div>
      </div>
    </div>

    <!-- KONTEKS LOMBA -->
    <div class="card" id="lombaCtx" hidden>
      <div class="sel-row">
        <label class="field"><span>Jenis</span><select class="inp" id="pnJenis"></select></label>
        <label class="field"><span>Lomba</span><select class="inp" id="pnLomba"></select></label>
      </div>
      <div class="statusbar" id="pnStatusBar"></div>
      <div class="search" id="pnSearchWrap" style="margin-top:12px;margin-bottom:0"><span class="iconify" data-icon="solar:magnifer-linear"></span><input id="pnSearch" placeholder="Cari nama / blok…"></div>
    </div>

    <div class="pane" id="paneHasil" hidden></div>
    <div class="pane" id="paneHadir" hidden></div>
    <div class="pane" id="panePeserta" hidden></div>
    <div class="pane" id="paneInfo" hidden></div>

    <!-- BOTTOM NAV -->
    <nav class="tabbar" id="tabbar">
      <button class="tab on" data-tab="iuran"><span class="iconify" data-icon="solar:wallet-money-linear"></span><i>Iuran</i></button>
      <button class="tab" data-tab="hasil"><span class="iconify" data-icon="solar:cup-star-linear"></span><i>Hasil</i></button>
      <button class="tab" data-tab="hadir"><span class="iconify" data-icon="solar:clipboard-check-linear"></span><i>Hadir</i></button>
      <button class="tab" data-tab="peserta"><span class="iconify" data-icon="solar:users-group-rounded-linear"></span><i>Peserta</i></button>
      <button class="tab" data-tab="info"><span class="iconify" data-icon="solar:bell-linear"></span><i>Info</i></button>
    </nav>
  </section>
</main>

<div class="scrim" id="scrim" hidden></div>
<div class="modal" id="modal" hidden>
  <div class="modal-h"><b>Catat Pembayaran</b><button class="icon-btn" id="mClose"><span class="iconify" data-icon="solar:close-circle-bold"></span></button></div>
  <div class="modal-kk" id="mKK"></div>
  <label class="field"><span>Nominal (Rp)</span><input class="inp" id="mNom" type="number" inputmode="numeric" placeholder="0"></label>
  <div class="quick" id="mQuick"></div>
  <label class="field"><span>Metode</span><select class="inp" id="mMetode"><option>Tunai</option><option>Transfer</option><option>QRIS</option></select></label>
  <label class="field"><span>Catatan (opsional)</span><input class="inp" id="mKet" placeholder="mis. cicilan ke-1"></label>
  <button class="btn btn-go" id="mSave">Simpan Pembayaran</button>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  var API='https://script.google.com/macros/s/AKfycbyEqxjavZ9ncF2iMZuWGstf7coiNGWAB5eHyw-nkOxOQ0ZyLwB93WP08jRBHkJPrI9S8g/exec';
  var $=function(s){return document.querySelector(s);};
  var esc=function(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});};
  var norm=function(s){return String(s==null?'':s).trim().toLowerCase().replace(/\s+/g,' ');};
  var num=function(v){if(v==null)return 0;if(typeof v==='number')return isNaN(v)?0:v;var s=String(v).trim().replace(/[^\d]/g,'');var n=parseInt(s,10);return isNaN(n)?0:n;};
  var rp=function(v){return 'Rp'+Math.round(num(v)).toLocaleString('id-ID');};
  var cap=function(s){return s.charAt(0).toUpperCase()+s.slice(1);};
  var scan=function(){try{if(window.Iconify)Iconify.scan();}catch(e){}};
  var _tt;function toast(m,t){var el=$('#toast');el.textContent=m;el.className='toast show '+(t||'');clearTimeout(_tt);_tt=setTimeout(function(){el.className='toast';},2600);}

  var STATUSES=['Belum','Bersiap','Sedang main','Selesai'];
  var ST={token:'',daftar:[],target:50000,qIuran:'',cur:null,
 data:null,jenis:'',lomba:'',tab:'iuran',qLomba:'',work:[],dirty:false};

  function apiGet(q,_sisa){var u=API+(q?('?'+q+'&cb='+Date.now()):('?cb='+Date.now()));var max=(_sisa==null?2:_sisa);
  return fetch(u).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
  .catch(function(err){if(max>0){return new Promise(function(res){setTimeout(res,1200);}).then(function(){return apiGet(q,max-1);});}throw err;});}
  function post(o){var b=new URLSearchParams();b.append('token',ST.token);Object.keys(o).forEach(function(k){b.append(k,o[k]);});
  return fetch(API,{method:'POST',body:b}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).catch(function(err){return{ok:false,error:'Gagal terhubung: '+(err.message||'jaringan')};});}

  function lockBtn(btn,label){

  function gateCheck(tok){
  var b=new URLSearchParams();
  b.append('aksi','cekToken');
  b.append('token',tok);

  return fetch(API,{method:'POST',body:b})
    .then(function(r){
      if(!r.ok)throw new Error('HTTP '+r.status);
      return r.json();
    })
    .then(function(r){
      return !!(r&&r.ok);

    .catch(function(){

  function applyStatusLocal_(L,s){
  if(!ST.data)return;
  if(!ST.data.statusLomba)ST.data.statusLomba=[];
  var f=ST.data.statusLomba.filter(function(x){return norm(x.jenis)===norm(L.jenis)&&norm(x.lomba)===norm(L.nama);})[0];
  if(f){f.status=s;}else{ST.data.statusLomba.push({jenis:L.jenis,lomba:L.nama,status:s});}
}
function setStatus(s){
  if(_busyStatus) return;
  var L=curLomba();
  if(!L)return;
  if(!navigator.onLine){toast('Tidak ada koneksi','err');return;}

  var prev=curStatus();        // simpan status lama untuk rollback
  applyStatusLocal_(L,s);      // 1) ubah lokal
  renderStatus();              // 2) tampilkan SEKARANG (instan, tanpa lag)

  _busyStatus=true;
  post({aksi:'setStatus',jenis:L.jenis,lomba:L.nama,status:s}).then(function(r){
    _busyStatus=false;
    if(!(r&&r.ok)){
      applyStatusLocal_(L,prev);   // 3) gagal → kembalikan
      renderStatus();
      toast((r&&r.error)||'Gagal — status dikembalikan','err');
      return;
    }
    toast('Status: '+s,'ok');
  });
}
  function addPeserta(){
  var L=curLomba();
  if(!L)return;
  var btn=$('#pnAddBtn');
  if(btn&&btn.dataset.busy) return;

  var nama=($('#pnAddNama').value||'').trim();
  var blok=($('#pnAddBlok').value||'').trim();
  if(!nama||!blok){toast('Nama & blok wajib diisi','err');return;}

  var unlock=lockBtn(btn,'Menambahkan…');
  post({
    aksi:'tambahPeserta',
    nama:nama,
    blok:blok,
    hp:($('#pnAddHp').value||'').trim(),
    jenis:L.jenis,
    lomba:L.nama,
    kelompok:L.kelompok||''
  }).then(function(r){
    unlock();
    if(r&&r.ok){toast('✓ Peserta ditambahkan','ok');loadLomba();}
    else if(r&&r.duplikat){toast('Sudah terdaftar di lomba ini','err');}
    else{toast((r&&r.error)||'Gagal menambahkan peserta','err');}
  });
}
  function kirimInfo(){
  var btn=$('#pnInBtn');
  if(btn&&btn.dataset.busy) return;

  var judul=($('#pnInJudul').value||'').trim();
  var isi=($('#pnInIsi').value||'').trim();

  if(!judul&&!isi){toast('Isi pengumuman dulu','err');return;}

  var unlock=lockBtn(btn,'Mengirim…');

  post({
    aksi:'tambahPengumuman',
    judul:judul,
    isi:isi,
    pin:($('#pnInPin').checked?'ya':'')
  }).then(function(r){
    unlock();
    if(r&&r.ok){
      toast('✓ Pengumuman terkirim','ok');
      $('#pnInJudul').value='';
      $('#pnInIsi').value='';
      $('#pnInPin').checked=false;
    }else{
      toast((r&&r.error)||'Gagal mengirim pengumuman','err');
    }
  });
}

  /* indikator koneksi */
var _netEl=null;
function netBanner(){
  if(!_netEl){
    _netEl=document.createElement('div');
    _netEl.id='netOff';
    _netEl.style.cssText='position:fixed;left:50%;transform:translateX(-50%);bottom:calc(88px + env(safe-area-inset-bottom,0px));z-index:95;background:#b3225f;color:#fff;font-weight:700;font-size:12.5px;padding:9px 16px;border-radius:999px;box-shadow:0 8px 24px -10px rgba(0,0,0,.6);transition:.2s;opacity:0;pointer-events:none';
    _netEl.textContent='⚠ Tidak ada koneksi internet';
    document.body.appendChild(_netEl);
  }
  _netEl.style.opacity=navigator.onLine?'0':'1';
}
window.addEventListener('online',function(){netBanner();toast('✓ Koneksi kembali','ok');});
window.addEventListener('offline',netBanner);

/* ===== AUTO-REFRESH LIVE ===== */
var _live=null;
function liveTick(){
  if(document.hidden||!navigator.onLine)return;
  if(_busyStatus)return;
  var ae=document.activeElement;
  var typing=ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.tagName==='SELECT');
  if(ST.tab==='iuran'){
    if(!$('#modal').hidden)return;   // jangan ganggu saat modal Catat terbuka
    if(typing)return;
    loadIuran(true);
  }else if(ST.tab==='hasil'||ST.tab==='hadir'||ST.tab==='peserta'){
    if(ST.dirty||typing)return;      // ada isian belum disimpan → tunda
    loadLomba(true);
  }
}
function startLive(){stopLive();_live=setInterval(liveTick,30000);}
function stopLive(){if(_live){clearInterval(_live);_live=null;}}
document.addEventListener('visibilitychange',function(){if(!document.hidden)liveTick();});

/* init — SELALU minta token saat halaman dibuka (keamanan) */ 
showGate();
netBanner();
})();

  var css=''

  function mount(){
  if(D.getElementById('utop')) return;
  var isPanitia=/panitia/i.test(location.pathname);
  var st=D.createElement('style'); st.id='navU3css'; st.textContent=css; D.head.appendChild(st);
    var sp=D.createElement('div'); sp.className='utop-sp'; D.body.insertBefore(sp,D.body.firstChild);

    var top=D.createElement('header'); top.id='utop'; top.className='utop';
    top.innerHTML='<button class="ub" id="uMenu" aria-label="Menu">'+svg('menu')+'</button>'
      +'<a class="ulogo" href="'+(isLomba?'lomba.html':'index.html')+'" aria-label="RT 08"><img src="logo.svg" alt="RT 08" onerror="this.onerror=null;this.src=\'icon-192.png\'"></a>'
+(isPanitia?'<span aria-hidden="true"></span>':'<button class="ub" id="uSearch" aria-label="Cari">'+svg('search')+'</button>');
    D.body.appendChild(top);

    var scrim=D.createElement('div'); scrim.id='uscrim'; scrim.className='uscrim'; D.body.appendChild(scrim);

    var dr=D.createElement('aside'); dr.id='udrawer'; dr.className='udrawer';
var links=NAV.map(function(n){var href=(isPanitia&&n.href.charAt(0)==='#')?'index.html'+n.href:n.href;
    dr.innerHTML='<div class="ud-head"><span class="ud-brand">RT 08 · 17 Agustusan</span><button class="ub" id="uClose" aria-label="Tutup">'+svg('close')+'</button></div>'
      +'<nav class="ud-nav">'+links+'</nav>'
      +'<div class="ud-theme"><span class="ud-tlbl">TAMPILAN</span>'
      +'<div class="ud-switch" id="uSwitch" role="button" tabindex="0" aria-label="Ganti mode terang atau gelap">'
      +'<span class="ud-opt light">'+svg('sun')+'<b>Terang</b></span>'

      +'<span class="ud-knob"></span></div></div>';

    var sr=null;
if(!isPanitia){
sr=D.createElement('div'); sr.id='usearch'; sr.className='usearch';
sr.innerHTML='<div class="us-bar"><span class="us-ic">'+svg('search')+'</span>'
  +'<input id="usInput" type="search" placeholder="Cari halaman, bagian'+(isLomba?', atau nama peserta…':'…')+'" autocomplete="off">'

D.body.appendChild(sr);

    function getT(){try{return localStorage.getItem('rt08-theme')==='dark'?'dark':'light';}catch(e){return 'light';}}
    function applyT(t){root.setAttribute('data-theme',t);var s=D.getElementById('uSwitch');if(s)s.classList.toggle('dark',t==='dark');}
    function setT(t){try{localStorage.setItem('rt08-theme',t);}catch(e){}applyT(t);}
    applyT(getT());
    var sw=D.getElementById('uSwitch');
    function tog(){setT(getT()==='dark'?'light':'dark');}
    sw.addEventListener('click',tog);
    sw.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();tog();}});

    function lock(v){root.style.overflow=v?'hidden':'';}
    function openD(){dr.classList.add('on');scrim.classList.add('on');lock(true);}
    function closeD(){dr.classList.remove('on');scrim.classList.remove('on');lock(false);}
    D.getElementById('uMenu').addEventListener('click',openD);
    D.getElementById('uClose').addEventListener('click',closeD);
    scrim.addEventListener('click',closeD);
    dr.querySelectorAll('.ud-link').forEach(function(a){a.addEventListener('click',function(){setTimeout(closeD,80);});});

    var sOn=false;
    function buildIndex(){
      var idx=[],seen={};
      NAV.forEach(function(n){idx.push({l:n.t,t:'Halaman',href:n.href});});
      D.querySelectorAll('h1,h2,h3').forEach(function(h){
        if(h.closest('#udrawer,#utop,#usearch,#ubot')) return;
        var txt=(h.textContent||'').replace(/\s+/g,' ').trim();
        if(!txt||txt.length>64) return;
        var sec=h.closest('[id]');
        idx.push({l:txt,t:'Bagian',href:sec?('#'+sec.id):null,el:h});
      });
      if(isLomba){try{D.querySelectorAll('#pesTbody tr').forEach(function(r){var c=r.children[1]||r.children[0];var nm=c?(c.textContent||'').trim():'';if(nm&&nm.length<40)idx.push({l:nm,t:'Peserta',href:'#peserta'});});}catch(e){}}
      return idx.filter(function(o){var k=o.t+'|'+o.l.toLowerCase();if(seen[k])return false;seen[k]=1;return true;});
    }
    function go(o){
      closeS();
      if(o.href&&o.href.charAt(0)==='#'){var el=D.querySelector(o.href);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});try{history.replaceState(null,'',o.href);}catch(e){}}
      else if(o.el){o.el.scrollIntoView({behavior:'smooth',block:'start'});}
      else if(o.href){location.href=o.href;}
    }
    function renderRes(q){
      var box=D.getElementById('usRes');if(!box)return;
      q=(q||'').toLowerCase().trim();
      var list=buildIndex().filter(function(o){return !q||o.l.toLowerCase().indexOf(q)>-1;}).slice(0,16);
      if(!list.length){box.innerHTML='<div class="us-empty">Tidak ada hasil.</div>';return;}
      box.innerHTML='';
      list.forEach(function(o){var a=D.createElement('a');a.className='us-item';a.innerHTML='<b>'+o.l.replace(/[<>&]/g,function(c){return c==='<'?'&lt;':c==='>'?'&gt;':'&amp;';})+'</b><span>'+o.t+'</span>';a.addEventListener('click',function(){go(o);});box.appendChild(a);});
    }
    function openS(){sr.classList.add('on');lock(true);sOn=true;var i=D.getElementById('usInput');if(i){i.value='';}renderRes('');if(i){setTimeout(function(){i.focus();},60);}}
    function closeS(){sr.classList.remove('on');lock(false);sOn=false;}
    if(!isPanitia){
D.getElementById('uSearch').addEventListener('click',openS);
D.getElementById('usClose').addEventListener('click',closeS);
D.getElementById('usInput').addEventListener('input',function(e){renderRes(e.target.value);});
}
    window.addEventListener('keydown',function(e){if(e.key==='Escape'){if(sOn)closeS();else if(dr.classList.contains('on'))closeD();}});

    var ids=NAV.filter(function(n){return n.id;}).map(function(n){return n.id;});
    function spy(){
      var off=(parseInt(getComputedStyle(root).getPropertyValue('--utop-h'),10)||56)+70;
      var y=(window.scrollY||window.pageYOffset)+off,cur=null;
      ids.forEach(function(id){var el=D.getElementById(id);if(el&&el.getBoundingClientRect().top+window.scrollY<=y)cur=id;});
      D.querySelectorAll('#ubot .ubn[data-id],#udrawer .ud-link[data-id]').forEach(function(a){a.classList.toggle('on',a.getAttribute('data-id')===cur);});
    }
    window.addEventListener('scroll',spy,{passive:true});
    window.addEventListener('resize',spy);
    spy();
  }

  if(D.readyState==='loading') D.addEventListener('DOMContentLoaded',mount);
  else mount();
})();
</script>
